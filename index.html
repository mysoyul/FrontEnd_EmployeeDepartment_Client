<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee & Department Manager</title>
</head>
<body>
    <!--
        React 마운트 포인트 (Mount Point)
        ─────────────────────────────────
        기존 HTML 방식: 모든 UI를 HTML에 직접 작성했습니다.
        React 방식:     빈 <div id="root"> 하나만 두고,
                        React가 자바스크립트로 이 안에 전체 UI를 그립니다.
    -->
    <div id="root"></div>

    <!-- React 앱 진입점 (CSS + 컴포넌트를 모두 여기서 불러옵니다) -->
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
