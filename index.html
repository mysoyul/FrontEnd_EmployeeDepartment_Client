<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee & Department Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 메시지 표시 영역 -->
    <div id="message-area">
        <div id="alert-success" class="alert alert-success">성공 메시지</div>
        <div id="alert-error" class="alert alert-error">오류 메시지</div>
    </div>

    <div class="container">
        <header>
            <h1>Employee & Department Manager</h1>
        </header>

        <!-- 탭 메뉴 -->
        <nav class="tabs">
            <button class="tab-button active" onclick="showTab('dept-section')">부서 관리 (Department)</button>
            <button class="tab-button" onclick="showTab('emp-section')">직원 관리 (Employee)</button>
        </nav>

        <!-- 부서 관리 섹션 (P1-1 집중 구현 영역) -->
        <section id="dept-section" class="content-section active">
            
            <!-- 부서 생성/수정 폼 -->
            <div class="card">
                <h3 id="dept-form-title">부서 등록</h3>
                <form id="dept-form">
                    <input type="hidden" id="dept-id"> <!-- 수정 시 ID 보관용 -->
                    <div class="form-inline">
                        <div class="form-group">
                            <label for="dept-name">부서명</label>
                            <input type="text" id="dept-name" placeholder="예: HR" required>
                        </div>
                        <div class="form-group">
                            <label for="dept-desc">부서 설명</label>
                            <input type="text" id="dept-desc" placeholder="부서에 대한 설명을 입력하세요" required>
                        </div>
                    </div>
                    <button type="submit" id="dept-submit-btn" class="btn btn-primary">부서 생성</button>
                    <button type="button" id="dept-cancel-btn" class="btn btn-info" style="display:none;">취소</button>
                </form>
            </div>

            <!-- 부서 단건 조회 -->
            <div class="card">
                <h3>부서 조회 (ID)</h3>
                <div class="form-inline">
                    <input type="number" id="search-dept-id" placeholder="부서 ID 입력" min="1">
                    <button type="button" class="btn btn-success">조회</button>
                </div>
                <div id="dept-detail-result" style="margin-top: 15px; display: none;">
                    <!-- 조회 결과가 여기에 표시됨 -->
                </div>
            </div>

            <!-- 부서 목록 -->
            <div class="card">
                <div class="list-header">
                    <h3>전체 부서 목록</h3>
                    <button class="btn btn-info">새로고침</button>
                </div>
                <div class="loading" id="dept-loading">데이터를 불러오는 중...</div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>부서명</th>
                            <th>부서 설명</th>
                            <th>작업</th>
                        </tr>
                    </thead>
                    <tbody id="dept-list">
                        <!-- API 데이터가 여기에 렌더링됨 -->
                        <tr>
                            <td>1</td>
                            <td>HR</td>
                            <td>performs human resource management functions</td>
                            <td class="actions">
                                <button class="btn btn-warning">수정</button>
                                <button class="btn btn-danger">삭제</button>
                            </td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Marketing</td>
                            <td>creates strategies to attract customers</td>
                            <td class="actions">
                                <button class="btn btn-warning">수정</button>
                                <button class="btn btn-danger">삭제</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 직원 관리 섹션 (다음 단계 구현용) -->
        <section id="emp-section" class="content-section">
            <div class="card">
                <h3>직원 관리 서비스 준비 중...</h3>
                <p>부서 관리 기능을 먼저 완료한 후 구현될 예정입니다.</p>
            </div>
        </section>
    </div>

    <!-- 나중에 기능 구현을 위한 JS 파일 링크 (지금은 비워둠) -->
    <!-- <script src="app.js"></script> -->
    <script>
        // 탭 전환 로직 (HTML/CSS 구조 확인용 간단한 스크립트)
        function showTab(sectionId) {
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
    <script src="js/department.js"></script>
</body>
</html>
